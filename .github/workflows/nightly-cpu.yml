name: Nightly CPU

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-cpu-main
  cancel-in-progress: true

jobs:
  smoke:
    name: CPU package and shared-runtime smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/ci/requirements-ci.lock.txt

      - name: Run CI pipeline
        run: make ci
