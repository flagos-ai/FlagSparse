name: GPU CI

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Accuracy test mode
        required: true
        default: quick
        type: choice
        options:
          - quick
          - normal
      ops:
        description: >-
          Comma-separated operator ids to run (keys of OP_TEST_CONFIGS in
          run_flagsparse_pytest.py). Leave empty to run all configured
          operators from conf/operators.yaml.
        required: false
        type: string

jobs:
  accuracy-smoke:
    name: GPU accuracy smoke
    runs-on:
      - self-hosted
      - linux
      - gpu
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/ci/requirements-triton-smoke.lock.txt

      - name: Install GPU test dependencies
        run: python -m pip install --upgrade -r tools/ci/requirements-triton-smoke.lock.txt

      - name: Validate CUDA environment
        run: |
          nvidia-smi
          python tools/ci/check_gpu_environment.py \
            --require-cuda \
            --metadata gpu_ci_metadata.json

      - name: Build source and wheel distributions
        run: python -m build

      - name: Install package
        run: python -m pip install --force-reinstall --no-deps dist/*.whl

      - name: Validate installed wheel import
        run: python tools/ci/check_installed_wheel.py --expected-version 1.0.0

      - name: Run GPU accuracy tests
        shell: bash
        run: |
          args=(
            run_flagsparse_accuracy.py
            --mode "${{ inputs.mode }}"
            --gpus 0
            --results-dir pytest_results
          )
          if [ -n "${{ inputs.ops }}" ]; then
            args+=(--ops "${{ inputs.ops }}")
          fi
          python "${args[@]}"

      - name: Upload GPU CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-ci-${{ github.run_id }}
          path: |
            gpu_ci_metadata.json
            pytest_results/
