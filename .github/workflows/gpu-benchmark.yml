name: GPU Benchmark

on:
  workflow_dispatch:
    inputs:
      ops:
        description: >-
          Comma-separated operator ids to benchmark (keys of OP_TEST_CONFIGS in
          run_flagsparse_pytest.py). Leave empty to run all configured
          operators from conf/operators.yaml.
        required: false
        type: string
      matrix_dir:
        description: MatrixMarket file or directory passed to mtx-backed operators
        required: true
        default: tests/data
        type: string
      warmup:
        description: Warmup iterations for operators that support it
        required: true
        default: "5"
        type: string
      iters:
        description: Timed iterations for operators that support it
        required: true
        default: "20"
        type: string
      benchmark_args:
        description: >-
          Extra args appended to every performance invocation (e.g.
          "--no-cusparse" or "--with-cusparse" for operators that support it).
        required: false
        type: string

jobs:
  benchmark:
    name: Run GPU benchmark
    runs-on:
      - self-hosted
      - linux
      - gpu
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/ci/requirements-triton-smoke.lock.txt

      - name: Install benchmark dependencies
        run: python -m pip install --upgrade -r tools/ci/requirements-triton-smoke.lock.txt

      - name: Validate CUDA environment
        run: |
          nvidia-smi
          python tools/ci/check_gpu_environment.py \
            --require-cuda \
            --metadata benchmark_results/gpu_metadata.json

      - name: Build source and wheel distributions
        run: python -m build

      - name: Install package
        run: python -m pip install --force-reinstall --no-deps dist/*.whl

      - name: Validate installed wheel import
        run: python tools/ci/check_installed_wheel.py --expected-version 1.0.0

      - name: Run GPU performance benchmarks
        shell: bash
        run: |
          args=(
            run_flagsparse_performance.py
            --benchmark-input "${{ inputs.matrix_dir }}"
            --benchmark-warmup "${{ inputs.warmup }}"
            --benchmark-iters "${{ inputs.iters }}"
            --gpus 0
            --results-dir benchmark_results
          )
          if [ -n "${{ inputs.ops }}" ]; then
            args+=(--ops "${{ inputs.ops }}")
          fi
          if [ -n "${{ inputs.benchmark_args }}" ]; then
            args+=(--benchmark-args "${{ inputs.benchmark_args }}")
          fi
          python "${args[@]}"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-benchmark-${{ github.run_id }}
          path: benchmark_results/
