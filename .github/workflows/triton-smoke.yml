name: Triton Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    name: Opt-in triton smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/ci/requirements-triton-smoke.lock.txt

      - name: Install triton smoke dependencies
        run: python -m pip install --upgrade -r tools/ci/requirements-triton-smoke.lock.txt

      - name: Compile source tree
        run: python -m compileall src tests tools

      - name: Build source and wheel distributions
        run: python -m build

      - name: Install package
        run: python -m pip install --force-reinstall --no-deps dist/*.whl

      - name: Validate installed wheel import
        run: python tools/ci/check_installed_wheel.py --expected-version 1.0.0

      - name: Run triton smoke tests
        run: FLAGSPARSE_TRITON_SMOKE=1 pytest tests/ci -q
